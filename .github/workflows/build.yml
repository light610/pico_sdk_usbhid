name: Build Pico Touch HID

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Clone Pico SDK and init submodules
        run: |
          git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk
          git submodule update --init --depth 1
          echo "PICO_SDK_PATH=${{ github.workspace }}/pico-sdk" >> $GITHUB_ENV

      - name: Copy pico_sdk_import.cmake
        run: cp pico-sdk/external/pico_sdk_import.cmake .

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_BOARD=pico -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: build
        run: make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico-touch-hid-firmware
          path: |
            build/*.uf2
            build/*.elf
